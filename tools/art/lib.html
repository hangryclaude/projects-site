<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: one ask() routing down the free-first chain, paid API as genuine last resort */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 26px; }
  .ask {
    font: 400 34px "SF Mono", Menlo, monospace; color: #ebe8e2;
    border: 1.5px solid rgba(167,139,250,0.6); border-radius: 12px; padding: 16px 30px;
    background: rgba(167,139,250,0.06); margin-bottom: 8px;
  }
  .ask .k { color: #a78bfa; }
  .chain { display: flex; flex-direction: column; gap: 12px; width: 620px; }
  .lvl { display: flex; align-items: center; gap: 20px; }
  .rail { width: 26px; display: flex; justify-content: center; flex: none; }
  .rail .line { width: 3px; height: 100%; background: rgba(63,220,130,0.4); }
  .node {
    flex: 1; display: flex; align-items: center; justify-content: space-between;
    padding: 15px 26px; border-radius: 12px; font: 400 28px "SF Mono", Menlo, monospace;
  }
  .free { border: 1.5px solid rgba(63,220,130,0.5); background: rgba(63,220,130,0.07); color: rgba(235,232,226,0.85); }
  .hit { border-color: #3fdc82; background: rgba(63,220,130,0.16); color: #ebe8e2; }
  .node .tag { font-size: 22px; }
  .free .tag { color: rgba(63,220,130,0.7); }
  .hit .tag { color: #3fdc82; font-weight: 600; }
  .paid { border: 1.5px dashed rgba(255,95,86,0.5); background: rgba(255,95,86,0.05); color: rgba(235,232,226,0.5); }
  .paid .tag { color: #ff5f56; font-size: 22px; }
  .dim { opacity: 0.42; }
  .cap { font: 400 28px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.5); margin-top: 12px; }
  .cap b { color: #3fdc82; font-weight: 600; }
</style>
</head><body>
<div id="frame" data-label="lib">
  <div id="scene">
    <div class="ask"><span class="k">ask</span>(prompt, { tier })</div>
    <div class="chain">
      <div class="lvl">
        <div class="rail"><div class="line"></div></div>
        <div class="node free">GitHub Models <span class="tag">429 &#8635;</span></div>
      </div>
      <div class="lvl">
        <div class="rail"><div class="line"></div></div>
        <div class="node hit">Groq <span class="tag">&#10003; answered &middot; $0</span></div>
      </div>
      <div class="lvl dim">
        <div class="rail"><div class="line" style="background:rgba(235,232,226,0.18)"></div></div>
        <div class="node free">Gemini &middot; OpenRouter &middot; Cerebras</div>
      </div>
      <div class="lvl dim">
        <div class="rail"><div class="line" style="background:rgba(235,232,226,0.18)"></div></div>
        <div class="node paid">Anthropic API <span class="tag">last resort</span></div>
      </div>
    </div>
    <div class="cap">free-first &middot; <b>paid API is a genuine last resort</b></div>
  </div>
</div>
</body></html>
