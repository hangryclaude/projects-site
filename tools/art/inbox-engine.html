<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: the fleet — 100 sending domains as envelopes, all green, one burned */
  #scene { display: flex; align-items: center; justify-content: center; gap: 90px; }
  .grid { display: block; }
  .stats { display: flex; flex-direction: column; gap: 36px; }
  .stat .n { font: 700 84px/1 "SF Mono", Menlo, monospace; color: #ebe8e2; letter-spacing: -0.03em; }
  .stat .u { font: 400 30px/1.5 "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.5); }
  .stat .n b { color: #34d372; font-weight: 700; }
  .burn { font: 400 26px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.4); }
  .burn i { color: #f4504a; font-style: normal; }
</style>
</head>

</html>
