<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: the Screen Time passcode mid-crack — lock popped, two digits down, two to go */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
  .title { color: rgba(235, 232, 226, 0.5); font: 400 28px "SF Mono", Menlo, monospace; letter-spacing: 0.04em; }
  .digits { display: flex; gap: 30px; }
  .cell {
    width: 118px; height: 148px; border-radius: 18px;
    border: 2px solid rgba(235, 232, 226, 0.22);
    display: flex; align-items: center; justify-content: center;
  }
  .cell.hit { border-color: rgba(74, 222, 128, 0.85); background: rgba(74, 222, 128, 0.08); }
  .cell.hit span { color: #4ade80; font: 600 84px "SF Mono", Menlo, monospace; }
  .dot { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid rgba(235, 232, 226, 0.4); }
  .hint { color: rgba(235, 232, 226, 0.45); font: 400 26px "SF Mono", Menlo, monospace; }
  .hint b { color: #4ade80; font-weight: 500; }
</style>
</head>
<body>
<div id="frame" data-label="screentime-remover">
  <div id="scene">
    <svg width="128" height="118" viewBox="0 0 100 92" fill="none">
      <g transform="translate(30,46) rotate(-26)">
        <path d="M0 0 V-16 a17 17 0 0 1 34 0 V0" stroke="#4ade80" stroke-width="6" stroke-linecap="round"/>
      </g>
      <rect x="16" y="46" width="62" height="44" rx="10" fill="rgba(74,222,128,0.12)" stroke="#4ade80" stroke-width="5"/>
      <circle cx="47" cy="64" r="5.5" fill="#4ade80"/>
      <rect x="44.5" y="66" width="5" height="11" rx="2.5" fill="#4ade80"/>
    </svg>
    <div class="title">Enter Screen Time Passcode</div>
    <div class="digits">
      <div class="cell hit"><span>4</span></div>
      <div class="cell hit"><span>2</span></div>
      <div class="cell"><div class="dot"></div></div>
      <div class="cell"><div class="dot"></div></div>
    </div>
    <div class="hint">brute force · attempt <b>4,231</b> / 10,000 · no rate limit</div>
  </div>
</div>
</body>
</html>
