<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: an iOS text field + a keyboard with one extra key — ✨ Generate Reply */
  #scene { display: flex; align-items: center; justify-content: center; }
  .phone { width: 720px; display: flex; flex-direction: column; gap: 26px; font-family: -apple-system, system-ui, sans-serif; }
  .incoming { align-self: flex-start; max-width: 78%; background: rgba(235,232,226,0.1); color: #ebe8e2;
              padding: 20px 28px; border-radius: 26px 26px 26px 6px; font-size: 30px; }
  .field {
    display: flex; align-items: center; gap: 16px;
    border: 1.5px solid rgba(122,162,255,0.5); border-radius: 26px; padding: 16px 22px;
    background: rgba(122,162,255,0.06);
  }
  .typed { flex: 1; color: #ebe8e2; font-size: 30px; }
  .typed .car { display: inline-block; width: 3px; height: 30px; background: #7aa2ff; vertical-align: -5px; margin-left: 2px; }
  .send { width: 44px; height: 44px; border-radius: 50%; background: #7aa2ff; flex: none;
          display: flex; align-items: center; justify-content: center; color: #0f0f11; font-size: 26px; }
  .kb { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
  .krow { display: flex; gap: 12px; justify-content: center; }
  .key { flex: 1; height: 40px; border-radius: 8px; background: rgba(235,232,226,0.09); }
  .genkey {
    display: flex; align-items: center; justify-content: center; gap: 14px;
    height: 64px; border-radius: 12px; background: #7aa2ff; color: #0f1220;
    font: 600 30px -apple-system, system-ui, sans-serif; margin-top: 6px;
    box-shadow: 0 0 40px rgba(122,162,255,0.35);
  }
  .cap { position: absolute; left: 0; right: 0; bottom: 58px; text-align: center;
         color: rgba(235,232,226,0.5); font: 400 27px "SF Mono", Menlo, monospace; }
</style>
</head>
<body>
<div id="frame" data-label="replykey">
  <div id="scene">
    <div class="phone">
      <div class="incoming">wyd this weekend?</div>
      <div class="field">
        <span class="typed">down for whatever — hit me sat<span class="car"></span></span>
        <span class="send">↑</span>
      </div>
      <div class="kb">
        <div class="krow"><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span></div>
        <div class="krow"><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span><span class="key"></span></div>
        <div class="genkey">✨ Generate Reply</div>
      </div>
    </div>
    <div class="cap">one extra key · every app · $0 on Ollama Cloud</div>
  </div>
</div>
</body>
</html>
