<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: study-hours timer as a mission launch console */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
  .star { position: absolute; border-radius: 50%; background: #ebe8e2; }
  .badge { display: flex; align-items: center; gap: 16px; color: #7aa2ff; font: 600 30px "SF Mono", Menlo, monospace; letter-spacing: 0.16em; }
  .badge .dot { width: 13px; height: 13px; border-radius: 50%; background: #7aa2ff; box-shadow: 0 0 14px #7aa2ff; }
  .clock { color: #ebe8e2; font: 700 168px/1 "SF Mono", Menlo, monospace; letter-spacing: 0.02em; }
  .clock .u { color: rgba(235,232,226,0.4); font-size: 88px; }
  .status { display: flex; gap: 44px; color: rgba(235,232,226,0.5); font: 400 27px "SF Mono", Menlo, monospace; }
  .status b { color: #7aa2ff; font-weight: 600; }
  .rocket { position: absolute; right: 150px; top: 150px; }
</style>
</head>
<body>
<div id="frame" data-label="hour-tracker">
  <div id="scene">
    <span class="star" style="left:180px;top:120px;width:4px;height:4px;opacity:.8"></span>
    <span class="star" style="left:300px;top:230px;width:3px;height:3px;opacity:.5"></span>
    <span class="star" style="left:940px;top:150px;width:5px;height:5px;opacity:.7"></span>
    <span class="star" style="left:1010px;top:280px;width:3px;height:3px;opacity:.45"></span>
    <span class="star" style="left:150px;top:560px;width:4px;height:4px;opacity:.6"></span>
    <span class="star" style="left:1030px;top:560px;width:3px;height:3px;opacity:.5"></span>
    <span class="star" style="left:240px;top:620px;width:3px;height:3px;opacity:.4"></span>
    <svg class="rocket" width="120" height="200" viewBox="0 0 120 200">
      <path d="M60 8 C86 40 92 92 92 128 L28 128 C28 92 34 40 60 8 Z" fill="#ebe8e2"/>
      <circle cx="60" cy="70" r="17" fill="#0f0f11"/><circle cx="60" cy="70" r="11" fill="#7aa2ff"/>
      <path d="M28 108 L6 150 L28 138 Z" fill="#7aa2ff"/>
      <path d="M92 108 L114 150 L92 138 Z" fill="#7aa2ff"/>
      <path d="M44 128 L76 128 L68 150 L52 150 Z" fill="rgba(235,232,226,0.3)"/>
      <path d="M50 150 C50 172 60 190 60 190 C60 190 70 172 70 150 Z" fill="#e6b455"/>
    </svg>
    <div class="badge"><span class="dot"></span>MISSION 162 · IN FLIGHT</div>
    <div class="clock">02:47<span class="u">:13</span></div>
    <div class="status"><span>study hours logged</span><span>today <b>+3.1h</b></span><span>T-minus <b>next launch</b></span></div>
  </div>
</div>
</body>
</html>
