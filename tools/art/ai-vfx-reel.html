<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a 9:16 reel mid-VFX-burst, electric violet */
  #scene { display: flex; align-items: center; justify-content: center; }
  .halo {
    position: absolute; left: 50%; top: 50%; width: 620px; height: 620px;
    transform: translate(-50%, -50%);
    background: radial-gradient(closest-side, rgba(139,92,246,0.22), transparent 70%);
    filter: blur(20px);
  }
  .phone {
    position: relative; width: 316px; height: 562px;
    border-radius: 42px; overflow: hidden;
    background: linear-gradient(180deg, #141318, #100f14);
    border: 2px solid rgba(235,232,226,0.32);
    box-shadow: 0 0 90px rgba(139,92,246,0.35);
  }
  .notch {
    position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
    width: 84px; height: 10px; border-radius: 5px; background: rgba(235,232,226,0.22); z-index: 6;
  }
  .burst {
    position: absolute; left: 50%; top: 47%; width: 300px; height: 300px;
    transform: translate(-50%, -50%);
    background:
      radial-gradient(closest-side, rgba(255,255,255,0.85) 0%, rgba(196,144,255,0.65) 14%, rgba(139,92,246,0.35) 38%, transparent 68%);
    filter: blur(2px);
  }
  .phone svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .play {
    position: absolute; left: 50%; top: 47%; transform: translate(-50%, -50%);
    width: 86px; height: 86px; border-radius: 50%; z-index: 5;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.55);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  .play::after {
    content: ""; margin-left: 7px;
    border-left: 26px solid #fff; border-top: 16px solid transparent; border-bottom: 16px solid transparent;
  }
  .stamp {
    position: absolute; right: 16px; bottom: 40px; z-index: 5;
    font: 600 19px "SF Mono", Menlo, monospace; color: #ebe8e2;
    background: rgba(15,15,17,0.6); padding: 4px 10px; border-radius: 8px;
  }
  .bar { position: absolute; left: 20px; right: 20px; bottom: 20px; height: 4px; border-radius: 2px;
    background: rgba(235,232,226,0.22); z-index: 5; }
  .bar::before { content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 38%;
    border-radius: 2px; background: #a78bfa; }
  .bar::after { content: ""; position: absolute; left: calc(38% - 5px); top: -3px;
    width: 10px; height: 10px; border-radius: 50%; background: #c4b5fd; }
</style>
</head>
<body>
<div id="frame" data-label="ai-vfx-reel">
  <div id="scene">
    <div class="halo"></div>
    <div class="phone">
      <div class="burst"></div>
      <svg viewBox="0 0 316 562">
        <defs>
          <linearGradient id="shard" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#f5f0ff"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <!-- shards radiating from the burst core (158, 264) -->
        <g fill="url(#shard)">
          <polygon points="158,264 148,254 158,120" opacity="0.95"/>
          <polygon points="158,264 168,256 232,152" opacity="0.8" transform="rotate(8 158 264)"/>
          <polygon points="158,264 150,272 66,168" opacity="0.7"/>
          <polygon points="158,264 166,272 268,300" opacity="0.75"/>
          <polygon points="158,264 150,258 52,290" opacity="0.65"/>
          <polygon points="158,264 166,258 244,410" opacity="0.8"/>
          <polygon points="158,264 148,266 84,404" opacity="0.7"/>
          <polygon points="158,264 164,254 158,392" opacity="0.5"/>
          <polygon points="158,264 152,250 106,132" opacity="0.6"/>
          <polygon points="158,264 168,266 282,214" opacity="0.6"/>
        </g>
        <!-- spark dots -->
        <g fill="#d8c9ff">
          <circle cx="98" cy="150" r="3"/><circle cx="236" cy="130" r="2.4"/>
          <circle cx="262" cy="342" r="3"/><circle cx="70" cy="330" r="2.2"/>
          <circle cx="196" cy="428" r="2.6"/><circle cx="118" cy="94" r="1.8"/>
          <circle cx="284" cy="252" r="2"/><circle cx="46" cy="222" r="2"/>
        </g>
      </svg>
      <div class="notch"></div>
      <div class="play"></div>
      <div class="stamp">0:07</div>
      <div class="bar"></div>
    </div>
  </div>
</div>
</body>
</html>
