<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: two identical repos, one stamped DEPRECATED — a monument to editing the wrong one */
  #scene { display: flex; align-items: center; justify-content: center; gap: 60px; }
  .repo { width: 356px; height: 300px; border-radius: 20px; padding: 30px 30px 26px; position: relative;
    border: 1.5px solid rgba(235,232,226,0.16); background: rgba(235,232,226,0.03);
    display: flex; flex-direction: column; }
  .rh { display: flex; align-items: center; gap: 14px; font: 600 27px "SF Mono", Menlo, monospace; color: #ebe8e2; margin: 34px 0 22px; }
  .rh .g { width: 26px; height: 26px; border-radius: 7px; border: 2px solid rgba(235,232,226,0.5); }
  .rl { font: 400 23px/2.1 "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.45); }
  .rl b { color: rgba(235,232,226,0.7); font-weight: 400; }
  /* dead one */
  .dead { opacity: 0.5; filter: grayscale(0.4); }
  .stamp { position: absolute; top: 118px; left: -14px; right: -14px; transform: rotate(-9deg);
    border: 4px solid #f4504a; color: #f4504a; text-align: center; border-radius: 10px;
    font: 800 40px "SF Mono", Menlo, monospace; letter-spacing: 0.14em; padding: 10px 0;
    background: rgba(15,15,17,0.72); }
  /* canonical */
  .live .rh .g { border-color: #39d98a; background: rgba(57,217,138,0.2); }
  .tag { position: absolute; top: 24px; right: 28px; font: 700 21px "SF Mono", Menlo, monospace;
    color: #39d98a; letter-spacing: 0.08em; }
  .arrow { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .arrow .a { font-size: 66px; color: rgba(235,232,226,0.5); line-height: 1; }
  .arrow .t { font: 400 22px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.4); }
  .cap { position: absolute; bottom: 58px; right: 74px; font: 400 25px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.42); }
</style>
</head><body>
<div id="frame" data-label="satellite-sb">
  <div id="scene">
    <div class="repo dead">
      <div class="rh"><span class="g"></span>satellite-sb</div>
      <div class="rl"><b>·</b> green CRT boot<br><b>·</b> 64-pin globe<br><b>·</b> orbital sweep</div>
      <div class="stamp">DEPRECATED</div>
    </div>
    <div class="arrow"><div class="a">→</div><div class="t">use →</div></div>
    <div class="repo live">
      <div class="tag">✓ CANONICAL</div>
      <div class="rh"><span class="g"></span>orbital-sb</div>
      <div class="rl"><b>·</b> green CRT boot<br><b>·</b> 64-pin globe<br><b>·</b> orbital sweep</div>
    </div>
    <div class="cap">edited the wrong repo. kept as a monument.</div>
  </div>
</div>
</body></html>
