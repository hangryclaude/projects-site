<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: pure atmosphere — layered aurora gradient field, deep + muted */
  .layer { position: absolute; border-radius: 50%; }
  .l1 { /* indigo mass, upper left */
    left: -160px; top: -200px; width: 920px; height: 740px;
    background: radial-gradient(closest-side, rgba(129,140,248,0.75), rgba(79,70,229,0.35) 55%, transparent 78%);
    filter: blur(55px);
  }
  .l2 { /* teal drift, right */
    right: -140px; top: 30px; width: 800px; height: 660px;
    background: radial-gradient(closest-side, rgba(45,212,191,0.6), rgba(15,118,110,0.28) 55%, transparent 78%);
    filter: blur(60px);
  }
  .l3 { /* plum bloom, bottom left */
    left: -40px; bottom: -240px; width: 820px; height: 660px;
    background: radial-gradient(closest-side, rgba(232,121,180,0.5), rgba(157,53,107,0.24) 55%, transparent 78%);
    filter: blur(65px);
  }
  .l4 { /* ember accent, low right */
    right: 40px; bottom: -160px; width: 520px; height: 420px;
    background: radial-gradient(closest-side, rgba(251,146,90,0.42), transparent 72%);
    filter: blur(55px);
  }
  .l5 { /* pale aurora ribbon across the middle */
    left: 60px; top: 230px; width: 1080px; height: 310px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(190,220,255,0.28), transparent 72%);
    filter: blur(42px);
    transform: rotate(-9deg);
  }
  .l6 { /* luminous core, off-center focal */
    left: 430px; top: 200px; width: 400px; height: 300px;
    background: radial-gradient(closest-side, rgba(160,200,255,0.34), rgba(140,180,255,0.1) 60%, transparent 75%);
    filter: blur(34px);
    transform: rotate(-9deg);
  }
  .veil { /* gentle edge vignette so it stays composed */
    position: absolute; inset: 0;
    background: radial-gradient(1500px 980px at 50% 46%, transparent 62%, rgba(15,15,17,0.55));
  }
</style>
</head>
<body>
<div id="frame" data-label="lusion-wallpaper">
  <div id="scene">
    <div class="layer l1"></div>
    <div class="layer l2"></div>
    <div class="layer l3"></div>
    <div class="layer l4"></div>
    <div class="layer l5"></div>
    <div class="layer l6"></div>
    <div class="veil"></div>
  </div>
</div>
</body>
</html>
