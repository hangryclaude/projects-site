<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a real phone — call it and Claude answers, text it and it texts back */
  #scene { display: flex; align-items: center; justify-content: center; gap: 84px; }
  .phone {
    width: 360px; height: 560px; border-radius: 46px; border: 3px solid rgba(235,232,226,0.28);
    background: rgba(235,232,226,0.03); padding: 30px 26px; display: flex; flex-direction: column;
  }
  .notch { width: 120px; height: 26px; border-radius: 14px; background: rgba(235,232,226,0.12); margin: 0 auto 26px; }
  /* incoming call banner */
  .call { display: flex; align-items: center; gap: 16px; padding: 18px 20px; border-radius: 20px;
          background: rgba(167,139,250,0.1); border: 1.5px solid rgba(167,139,250,0.5); margin-bottom: 26px; }
  .call .glyph { width: 46px; height: 46px; border-radius: 50%; background: rgba(167,139,250,0.2);
                 display: flex; align-items: center; justify-content: center; }
  .call .glyph svg { display: block; }
  .call .who { font: 600 27px "SF Mono", Menlo, monospace; color: #ebe8e2; }
  .call .st { font: 400 21px "SF Mono", Menlo, monospace; color: #3fdc82; margin-top: 2px; }
  /* chat thread */
  .thread { display: flex; flex-direction: column; gap: 16px; flex: 1; }
  .bub { max-width: 78%; padding: 15px 20px; font: 400 24px/1.3 "SF Mono", Menlo, monospace; border-radius: 20px; }
  .me { align-self: flex-end; background: rgba(235,232,226,0.14); color: #ebe8e2; border-bottom-right-radius: 6px; }
  .jv { align-self: flex-start; background: rgba(167,139,250,0.22); color: #ebe8e2; border-bottom-left-radius: 6px; }
  .tags { display: flex; flex-direction: column; gap: 30px; }
  .tag { font: 400 30px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.6); }
  .tag b { display: block; color: #ebe8e2; font-weight: 600; font-size: 34px; margin-bottom: 6px; }
  .tag .m { color: #a78bfa; }
  .cap { font: 400 27px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.45); margin-top: 14px; }
  .cap b { color: #a78bfa; font-weight: 600; }
</style>
</head><body>
<div id="frame" data-label="jarvis">
  <div id="scene">
    <div class="phone">
      <div class="notch"></div>
      <div class="call">
        <div class="glyph">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
            <path d="M4 4h4l2 5-3 2c1 3 3 5 6 6l2-3 5 2v4c0 1-1 2-2 2C10 24 0 14 0 4c0-1 1-2 2-2" fill="#a78bfa" transform="translate(1 -1) scale(0.92)"/>
          </svg>
        </div>
        <div><div class="who">Jarvis</div><div class="st">calling&hellip;</div></div>
      </div>
      <div class="thread">
        <div class="bub me">book me a table fri 8pm</div>
        <div class="bub jv">Done — Bestia, 8pm, 2 guests. Confirmed &#10003;</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:44px">
      <div class="tags">
        <div class="tag"><b>voice</b><span class="m">Haiku</span> &middot; fast, spoken</div>
        <div class="tag"><b>sms</b><span class="m">Sonnet</span> &middot; tools + vision</div>
      </div>
      <div class="cap">no app &middot; <b>Claude on a phone line</b></div>
    </div>
  </div>
</div>
</body></html>
