<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: sell-first arbitrage — a SOLD listing, then the buy-after math netting profit, never holding stock */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 52px; }
  .top { display: flex; align-items: center; gap: 56px; }
  .listing { width: 300px; background: #141416; border: 1.5px solid rgba(235,232,226,0.16);
    border-radius: 18px; overflow: hidden; position: relative; }
  .photo { height: 190px; background: linear-gradient(135deg,#2b2f36,#191b1f); position: relative; }
  .photo svg { position: absolute; inset: 0; margin: auto; }
  .sold { position: absolute; top: 34px; left: -46px; width: 220px; text-align: center;
    background: #f4504a; color: #fff; font: 800 26px "SF Mono", Menlo, monospace; letter-spacing: 0.14em;
    padding: 9px 0; transform: rotate(-24deg); }
  .meta { padding: 18px 22px 22px; }
  .meta .t { color: #ebe8e2; font: 500 25px "SF Mono", Menlo, monospace; }
  .meta .p { color: #34d372; font: 700 40px "SF Mono", Menlo, monospace; margin-top: 6px; }
  .math { display: flex; align-items: center; gap: 26px; font: 700 46px "SF Mono", Menlo, monospace; }
  .math .op { color: rgba(235,232,226,0.4); font-weight: 400; }
  .math .neg { color: rgba(235,232,226,0.65); }
  .math .sub { display: block; font: 400 21px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.4); text-align: center; margin-top: 8px; }
  .math .net { color: #34d372; }
  .cap { color: rgba(235,232,226,0.45); font: 400 26px "SF Mono", Menlo, monospace; }
  .cap b { color: #34d372; font-weight: 500; }
</style>
</head><body>
<div id="frame" data-label="depop-flipper">
  <div id="scene">
    <div class="top">
      <div class="listing">
        <div class="photo">
          <span class="sold">SOLD</span>
          <svg width="88" height="88" viewBox="0 0 24 24" fill="none" stroke="rgba(235,232,226,0.28)" stroke-width="1.4"><path d="M4 8l4-4h8l4 4-3 3v9H7v-9L4 8z"/></svg>
        </div>
        <div class="meta"><div class="t">Carhartt Detroit</div><div class="p">$68</div></div>
      </div>
      <div class="math">
        <span class="neg">$24<span class="sub">buy after</span></span>
        <span class="op">=</span>
        <span class="net">+$44<span class="sub" style="color:rgba(52,211,114,0.6)">net</span></span>
      </div>
    </div>
    <div class="cap">list first · buy after it sells · <b>never hold stock</b></div>
  </div>
</div>
</body></html>
