<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a one-file fan referral landing page with a single swappable REF_LINK constant */
  #scene { display:flex; align-items:center; justify-content:center; gap:80px; }
  #scene::before { content:""; position:absolute; inset:0; z-index:0;
    background: radial-gradient(46% 50% at 40% 46%, rgba(124,92,255,0.22), transparent 70%); }
  .card { position:relative; z-index:1; width:430px; border-radius:24px; padding:44px 40px 40px;
    background: linear-gradient(165deg, rgba(124,92,255,0.14), rgba(15,15,17,0.2));
    border:1px solid rgba(167,139,250,0.35); box-shadow:0 0 54px rgba(124,92,255,0.22); }
  .wm { color:#a78bfa; font: 800 30px "SF Mono", Menlo, monospace; letter-spacing:0.14em; }
  .h1 { color:#ebe8e2; font: 700 46px/1.1 -apple-system, system-ui, sans-serif; letter-spacing:-0.02em; margin:22px 0 14px; }
  .h1 em { font-style:normal; color:#a78bfa; }
  .sub { color:rgba(235,232,226,0.5); font: 400 24px/1.4 "SF Mono", Menlo, monospace; }
  .plat { display:flex; gap:12px; margin:26px 0 28px; }
  .plat span { width:34px; height:34px; border-radius:9px; border:1.5px solid rgba(235,232,226,0.32); }
  .cta { display:inline-flex; align-items:center; gap:12px; background:#a78bfa; color:#160c2e;
    font: 700 26px "SF Mono", Menlo, monospace; padding:15px 30px; border-radius:13px; }
  .cta .lk { font-size:24px; }
  .fan { margin-top:26px; color:rgba(235,232,226,0.4); font:400 21px "SF Mono", Menlo, monospace; }
  .side { position:relative; z-index:1; display:flex; flex-direction:column; gap:20px; max-width:420px; }
  .code { background:#0b0b0d; border:1px solid rgba(235,232,226,0.18); border-radius:14px; padding:24px 26px;
    font: 500 27px/1.5 "SF Mono", Menlo, monospace; color:rgba(235,232,226,0.6); }
  .code .k { color:#c9b8ff; }
  .code .v { color:#a78bfa; }
  .code .hl { background:rgba(167,139,250,0.16); border-radius:5px; padding:1px 4px; }
  .note { color:rgba(235,232,226,0.5); font: 400 25px/1.5 "SF Mono", Menlo, monospace; }
  .note b { color:#ebe8e2; font-weight:500; }
  .badge { align-self:flex-start; border:1px solid rgba(167,139,250,0.5); color:#c9b8ff; font:500 22px "SF Mono", Menlo, monospace; padding:6px 16px; border-radius:999px; }
</style>
</head>
<body>
<div id="frame" data-label="heynox-referral">
  <div id="scene">
    <div class="card">
      <div class="wm">RPLY</div>
      <div class="h1">Leave <em>read</em><br>behind.</div>
      <div class="sub">every app · one inbox</div>
      <div class="plat"><span></span><span></span><span></span><span></span></div>
      <a class="cta"><span class="lk">⚲</span>Get RPLY — free</a>
      <div class="fan">Not affiliated · fan referral page</div>
    </div>
    <div class="side">
      <span class="badge">one file · 12KB · zero deps</span>
      <div class="code"><span class="k">const</span> REF_LINK =<br>&nbsp;&nbsp;<span class="v">"rply.com/r/<span class="hl">••••</span>"</span>;</div>
      <div class="note">swap <b>one constant</b>, every<br>button points at your code.</div>
    </div>
  </div>
</div>
</body>
</html>
