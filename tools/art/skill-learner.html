<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a session correction captured and written to lasting memory */
  #scene { display: flex; align-items: center; justify-content: center; gap: 56px; padding: 0 100px; }
  .card { border: 1.5px solid rgba(235,232,226,0.22); border-radius: 18px; padding: 30px 34px; width: 430px; }
  .cap { color: rgba(235,232,226,0.42); font: 500 23px "SF Mono", Menlo, monospace; letter-spacing: 0.05em; margin-bottom: 22px; }
  .line { font: 400 30px/1.35 "SF Mono", Menlo, monospace; margin-bottom: 18px; }
  .who { display: inline-block; width: 148px; color: rgba(235,232,226,0.4); }
  .claude { color: rgba(235,232,226,0.55); text-decoration: line-through; text-decoration-color: rgba(255,92,92,0.6); }
  .user { color: #ebe8e2; }
  .user .fix { color: #7aa2ff; }
  .arrow { display: flex; flex-direction: column; align-items: center; gap: 12px; color: #7aa2ff; }
  .arrow svg { display: block; }
  .arrow .lbl { font: 600 24px "SF Mono", Menlo, monospace; letter-spacing: 0.04em; }
  .file { color: #3fdc82; font: 600 26px "SF Mono", Menlo, monospace; margin-bottom: 24px; }
  .mem { display: flex; align-items: flex-start; gap: 16px; font: 400 30px/1.3 "SF Mono", Menlo, monospace; color: #ebe8e2; }
  .mem .ck { color: #3fdc82; font-weight: 700; }
  .sub { color: rgba(235,232,226,0.42); font: 400 24px "SF Mono", Menlo, monospace; margin-top: 22px; }
</style>
</head>
<body>
<div id="frame" data-label="skill-learner">
  <div id="scene">
    <div class="card">
      <div class="cap">SESSION TRANSCRIPT</div>
      <div class="line"><span class="who">claude</span><span class="claude">I'll use a relative path…</span></div>
      <div class="line"><span class="who">you</span><span class="user">no — <span class="fix">always absolute paths</span></span></div>
    </div>

    <div class="arrow">
      <svg width="118" height="40" viewBox="0 0 118 40" fill="none">
        <path d="M2 20 H100" stroke="#7aa2ff" stroke-width="3"/>
        <path d="M94 10 L112 20 L94 30" stroke="#7aa2ff" stroke-width="3" fill="none"/>
      </svg>
      <span class="lbl">learns</span>
    </div>

    <div class="card">
      <div class="file">feedback_2026-07-03.md</div>
      <div class="mem"><span class="ck">&#10003;</span><span>Always use absolute paths, never relative.</span></div>
      <div class="sub">loaded into every future session · same mistake, never twice</div>
    </div>
  </div>
</div>
</body>
</html>
