<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a sentence being ghost-completed system-wide, with a Tab keycap */
  #scene { display: flex; flex-direction: column; justify-content: center; padding: 0 110px; gap: 44px; }
  .line { font: 400 54px/1.35 "SF Mono", Menlo, monospace; letter-spacing: -0.01em; }
  .typed { color: #ebe8e2; }
  .caret { display: inline-block; width: 4px; height: 52px; background: #7aa2ff; vertical-align: -8px; margin: 0 2px; }
  .ghost { color: rgba(122, 162, 255, 0.55); }
  .row2 { display: flex; align-items: center; gap: 26px; }
  .keycap {
    display: inline-block; padding: 14px 34px;
    border: 2px solid rgba(122, 162, 255, 0.8); border-bottom-width: 6px; border-radius: 14px;
    color: #7aa2ff; font: 600 30px "SF Mono", Menlo, monospace;
    background: rgba(122, 162, 255, 0.08);
  }
  .hint { color: rgba(235, 232, 226, 0.45); font-size: 26px; }
  .apps { position: absolute; top: 64px; right: 70px; display: flex; gap: 14px; }
  .app { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid rgba(235,232,226,0.35); }
  .app.on { background: #7aa2ff; border-color: #7aa2ff; }
</style>
</head>
<body>
<div id="frame" data-label="ghostype">
  <div id="scene">
    <div class="apps"><span class="app on"></span><span class="app on"></span><span class="app on"></span><span class="app on"></span><span class="app on"></span></div>
    <div class="line typed">hey, sounds good — let's<span class="caret"></span><span class="ghost"> lock in Friday at 2, I'll send the invite</span></div>
    <div class="row2"><span class="keycap">tab</span><span class="hint">accepts · every app · 100% local</span></div>
  </div>
</div>
</body>
</html>
