<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: voice in, text out — waveform collapsing into a reply, nothing leaves the mac */
  #scene { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 54px; }
  .wave { display: block; }
  .reply { font: 400 40px "SF Mono", Menlo, monospace; color: #ebe8e2; }
  .reply .arrow { color: #2dd4bf; margin-right: 18px; }
  .reply .dim { color: rgba(235,232,226,0.45); }
  .row { display: flex; align-items: center; gap: 34px; }
  .badge {
    padding: 12px 30px; border-radius: 999px;
    border: 2px solid #2dd4bf; color: #2dd4bf;
    font: 600 26px "SF Mono", Menlo, monospace;
    background: rgba(45,212,191,0.08); letter-spacing: 0.04em;
  }
  .nocloud { display: flex; align-items: center; gap: 14px; color: rgba(235,232,226,0.45); font-size: 26px; }
</style>
</head>
<body>
<div id="frame" data-label="sira">
  <div id="scene">
    <svg class="wave" width="880" height="180" viewBox="0 0 880 180">
      <!-- voice bars collapsing to a flat line, left→right -->
      <g stroke="#2dd4bf" stroke-width="10" stroke-linecap="round">
        <line x1="20"  y1="55"  x2="20"  y2="125"/>
        <line x1="55"  y1="25"  x2="55"  y2="155"/>
        <line x1="90"  y1="60"  x2="90"  y2="120"/>
        <line x1="125" y1="10"  x2="125" y2="170"/>
        <line x1="160" y1="45"  x2="160" y2="135"/>
        <line x1="195" y1="22"  x2="195" y2="158"/>
        <line x1="230" y1="58"  x2="230" y2="122"/>
        <line x1="265" y1="35"  x2="265" y2="145"/>
        <line x1="300" y1="62"  x2="300" y2="118"/>
        <line x1="335" y1="48"  x2="335" y2="132"/>
        <line x1="370" y1="68"  x2="370" y2="112"/>
        <line x1="405" y1="58"  x2="405" y2="122"/>
        <line x1="440" y1="72"  x2="440" y2="108"/>
        <line x1="475" y1="66"  x2="475" y2="114"/>
        <line x1="510" y1="78"  x2="510" y2="102"/>
        <line x1="545" y1="74"  x2="545" y2="106"/>
        <line x1="580" y1="83"  x2="580" y2="97"/>
        <line x1="615" y1="80"  x2="615" y2="100"/>
        <line x1="650" y1="86"  x2="650" y2="94"/>
        <line x1="685" y1="88"  x2="685" y2="92"/>
      </g>
      <line x1="710" y1="90" x2="860" y2="90" stroke="#2dd4bf" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    </svg>
    <div class="reply"><span class="arrow">→</span>"timer set. <span class="dim">anything else?</span>"</div>
    <div class="row">
      <span class="badge">on-device</span>
      <span class="nocloud">
        <svg width="46" height="34" viewBox="0 0 46 34">
          <path d="M13 27 a8 8 0 0 1 -1 -16 a10 10 0 0 1 19 -3 a8 8 0 0 1 3 19 z"
                fill="none" stroke="rgba(235,232,226,0.45)" stroke-width="2.5" stroke-linejoin="round"/>
          <line x1="5" y1="31" x2="41" y2="3" stroke="#2dd4bf" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
        heard by no one
      </span>
    </div>
  </div>
</div>
</body>
</html>
