<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: daily 9:16 product shorts — a reel of vertical frames, center one live */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 38px; }
  .reel { display: flex; align-items: center; gap: 26px; }
  .frame { border-radius: 20px; overflow: hidden; position: relative; border: 1px solid rgba(235,232,226,0.14);
           background: linear-gradient(160deg, #1a1c22, #101116); }
  .side { width: 214px; height: 380px; opacity: 0.34; }
  .side .tee { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .center { width: 268px; height: 470px; border-color: rgba(255,77,77,0.4); box-shadow: 0 0 40px rgba(0,0,0,0.5); }
  .prog { position: absolute; top: 14px; left: 14px; right: 14px; display: flex; gap: 6px; }
  .prog i { flex: 1; height: 4px; border-radius: 2px; background: rgba(235,232,226,0.25); }
  .prog i.on { background: #ebe8e2; }
  .hook { position: absolute; top: 42px; left: 20px; right: 20px; font: 700 30px/1.15 -apple-system, system-ui, sans-serif; color: #ebe8e2; }
  .hook em { font-style: normal; color: #ff4d4d; }
  .tee { color: rgba(235,232,226,0.7); }
  .prod { position: absolute; top: 150px; left: 0; right: 0; display: flex; justify-content: center; }
  .brand { position: absolute; bottom: 92px; left: 20px; font: 600 20px "SF Mono", Menlo, monospace; letter-spacing: 0.14em; color: rgba(235,232,226,0.6); }
  .cta { position: absolute; bottom: 26px; left: 20px; right: 20px; text-align: center;
         background: #ff4d4d; color: #0f0f11; border-radius: 12px; padding: 14px 0;
         font: 700 22px "SF Mono", Menlo, monospace; letter-spacing: 0.04em; }
  .foot { font: 400 25px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.45); }
  .foot b { color: rgba(255,77,77,0.85); font-weight: 500; }
</style>
</head>
<body>
<div id="frame" data-label="ug-social">
  <div id="scene">
    <div class="reel">
      <div class="frame side"><div class="tee"><svg width="90" height="90" viewBox="0 0 100 100"><path d="M32 22 L20 32 L28 44 L34 40 V80 H66 V40 L72 44 L80 32 L68 22 A18 10 0 0 1 32 22 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg></div></div>
      <div class="frame center">
        <div class="prog"><i class="on"></i><i class="on"></i><i></i><i></i></div>
        <div class="hook">new drop,<br><em>tap to cop →</em></div>
        <div class="prod tee"><svg width="132" height="132" viewBox="0 0 100 100"><path d="M32 22 L20 32 L28 44 L34 40 V80 H66 V40 L72 44 L80 32 L68 22 A18 10 0 0 1 32 22 Z" fill="rgba(235,232,226,0.05)" stroke="rgba(235,232,226,0.8)" stroke-width="2.5" stroke-linejoin="round"/><path d="M43 30 A10 6 0 0 0 57 30" fill="none" stroke="rgba(235,232,226,0.8)" stroke-width="2.5"/></svg></div>
        <div class="brand">UNDERGROUND805</div>
        <div class="cta">SHOP NOW</div>
      </div>
      <div class="frame side"><div class="tee"><svg width="90" height="90" viewBox="0 0 100 100"><path d="M32 22 L20 32 L28 44 L34 40 V80 H66 V40 L72 44 L80 32 L68 22 A18 10 0 0 1 32 22 Z" fill="none" stroke="currentColor" stroke-width="3" stroke-linejoin="round"/></svg></div></div>
    </div>
    <div class="foot">Shopify → daily 9:16 · <b>local Ollama + ffmpeg</b> · $0, cycles the catalog</div>
  </div>
</div>
</body>
</html>
