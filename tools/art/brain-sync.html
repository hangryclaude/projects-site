<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: the whole stack as one wikilinked graph, a hub with cross-linked nodes */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .node text { font-family: "SF Mono", Menlo, monospace; fill: rgba(235,232,226,0.82); font-size: 23px; }
  .cap { color: rgba(235,232,226,0.5); font: 400 27px "SF Mono", Menlo, monospace; margin-top: 30px; letter-spacing: 0.01em; }
  .cap b { color: #7aa2ff; font-weight: 400; }
</style>
</head>
<body>
<div id="frame" data-label="brain-sync">
  <div id="scene">
    <svg width="1000" height="500" viewBox="0 0 1000 500" fill="none">
      <!-- edges -->
      <g stroke="rgba(122,162,255,0.4)" stroke-width="2">
        <line x1="500" y1="250" x2="205" y2="110"/>
        <line x1="500" y1="250" x2="500" y2="80"/>
        <line x1="500" y1="250" x2="810" y2="120"/>
        <line x1="500" y1="250" x2="150" y2="300"/>
        <line x1="500" y1="250" x2="850" y2="320"/>
        <line x1="500" y1="250" x2="300" y2="440"/>
        <line x1="500" y1="250" x2="720" y2="440"/>
      </g>
      <!-- cross-links (shared names) -->
      <g stroke="rgba(122,162,255,0.65)" stroke-width="2.5" stroke-dasharray="6 7">
        <line x1="205" y1="110" x2="500" y2="80"/>
        <line x1="850" y1="320" x2="720" y2="440"/>
      </g>
      <!-- satellite nodes -->
      <g class="node">
        <g><circle cx="205" cy="110" r="15" fill="#131316" stroke="#7aa2ff" stroke-width="2.5"/><text x="205" y="76" text-anchor="middle">skillify</text></g>
        <g><circle cx="500" cy="80" r="15" fill="#131316" stroke="#7aa2ff" stroke-width="2.5"/><text x="500" y="46" text-anchor="middle">shrink</text></g>
        <g><circle cx="810" cy="120" r="15" fill="#131316" stroke="#7aa2ff" stroke-width="2.5"/><text x="810" y="86" text-anchor="middle">morning-brief</text></g>
        <g><circle cx="150" cy="300" r="15" fill="#131316" stroke="#7aa2ff" stroke-width="2.5"/><text x="150" y="345" text-anchor="middle">habit-warden</text></g>
        <g><circle cx="850" cy="320" r="15" fill="#131316" stroke="#7aa2ff" stroke-width="2.5"/><text x="850" y="365" text-anchor="middle">inbox-engine</text></g>
        <g><circle cx="300" cy="440" r="15" fill="#131316" stroke="#7aa2ff" stroke-width="2.5"/><text x="300" y="485" text-anchor="middle">eyesite-saver</text></g>
        <g><circle cx="720" cy="440" r="15" fill="#131316" stroke="#7aa2ff" stroke-width="2.5"/><text x="720" y="485" text-anchor="middle">lead-agent</text></g>
      </g>
      <!-- hub -->
      <circle cx="500" cy="250" r="60" fill="#7aa2ff"/>
      <circle cx="500" cy="250" r="74" fill="none" stroke="rgba(122,162,255,0.3)" stroke-width="2"/>
      <text x="500" y="259" text-anchor="middle" font-family="SF Mono, Menlo, monospace" font-size="25" font-weight="600" fill="#0f0f11">~/Brain</text>
    </svg>
    <div class="cap">every tool · skill · repo · project → <b>one wikilinked map</b></div>
  </div>
</div>
</body>
</html>
