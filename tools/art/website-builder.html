<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a Maps business with no website → auto-generate the site → pitch it for $50 */
  #scene { display: flex; align-items: center; justify-content: center; gap: 0; padding: 0 90px; }

  .card { width: 372px; border: 1.5px solid rgba(235,232,226,0.16); border-radius: 16px; overflow: hidden; background: rgba(235,232,226,0.03); }
  .card .map { height: 150px; position: relative; background:
      repeating-linear-gradient(0deg, rgba(235,232,226,0.06) 0 1px, transparent 1px 46px),
      repeating-linear-gradient(90deg, rgba(235,232,226,0.06) 0 1px, transparent 1px 46px);
  }
  .card .road { position: absolute; background: rgba(235,232,226,0.09); }
  .pin { position: absolute; left: 50%; top: 42px; transform: translateX(-50%);
         width: 40px; height: 40px; border-radius: 50% 50% 50% 0; transform-origin: center;
         transform: translateX(-50%) rotate(-45deg); background: #f5a623; box-shadow: 0 0 34px rgba(245,166,35,0.4); }
  .pin::after { content: ""; position: absolute; left: 12px; top: 12px; width: 16px; height: 16px; border-radius: 50%; background: #0f0f11; }
  .card .body { padding: 20px 24px 24px; }
  .card .name { color: #ebe8e2; font: 600 32px "SF Mono", Menlo, monospace; }
  .card .meta { margin-top: 8px; color: rgba(235,232,226,0.5); font: 400 24px "SF Mono", Menlo, monospace; }
  .card .site { margin-top: 16px; display: flex; align-items: center; gap: 12px;
                color: #ff6a5a; font: 500 26px "SF Mono", Menlo, monospace; }
  .card .site s { text-decoration: line-through; text-decoration-color: rgba(255,106,90,0.7); color: rgba(255,106,90,0.85); }

  .arrow { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 0 34px; }
  .arrow .lab { color: #f5a623; font: 600 22px "SF Mono", Menlo, monospace; letter-spacing: 0.04em; }
  .arrow svg { width: 96px; height: 30px; }

  .win { width: 372px; border: 1.5px solid rgba(245,166,35,0.5); border-radius: 16px; overflow: hidden;
         background: rgba(245,166,35,0.04); box-shadow: 0 0 54px rgba(245,166,35,0.16); position: relative; }
  .win .bar { height: 44px; display: flex; align-items: center; gap: 10px; padding: 0 20px; border-bottom: 1.5px solid rgba(245,166,35,0.25); }
  .win .bar span { width: 13px; height: 13px; border-radius: 50%; background: rgba(245,166,35,0.55); }
  .win .page { padding: 26px 26px 34px; }
  .win .hero { height: 20px; width: 78%; border-radius: 6px; background: rgba(235,232,226,0.85); }
  .win .sub { height: 13px; width: 55%; border-radius: 5px; background: rgba(235,232,226,0.3); margin-top: 16px; }
  .win .img { height: 82px; border-radius: 10px; background: rgba(245,166,35,0.18); margin-top: 22px; }
  .win .cta { margin-top: 22px; height: 40px; width: 150px; border-radius: 9px; background: #f5a623; }
  .stamp { position: absolute; right: -14px; bottom: 30px; transform: rotate(-8deg);
           padding: 10px 22px; border: 3px solid #f5a623; border-radius: 10px; background: #0f0f11;
           color: #f5a623; font: 700 32px "SF Mono", Menlo, monospace; letter-spacing: 0.04em; }

  .cap { position: absolute; left: 250px; right: 90px; bottom: 62px; text-align: center;
         color: rgba(235,232,226,0.42); font: 400 26px "SF Mono", Menlo, monospace; }
  .cap b { color: #f5a623; font-weight: 600; }
</style>
</head>
<body>
<div id="frame" data-label="website-builder">
  <div id="scene">
    <div class="card">
      <div class="map">
        <div class="road" style="left:0; right:0; top:96px; height:9px;"></div>
        <div class="road" style="top:0; bottom:0; left:112px; width:9px;"></div>
        <div class="pin"></div>
      </div>
      <div class="body">
        <div class="name">Mario's Auto</div>
        <div class="meta">★ 4.6 · Auto repair · Open now</div>
        <div class="site">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ff6a5a" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18"/></svg>
          <s>no website</s>
        </div>
      </div>
    </div>

    <div class="arrow">
      <span class="lab">auto-build</span>
      <svg viewBox="0 0 96 30" fill="none" stroke="#f5a623" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15 H84"/><path d="M72 5 L86 15 L72 25"/></svg>
    </div>

    <div class="win">
      <div class="bar"><span></span><span></span><span></span></div>
      <div class="page">
        <div class="hero"></div>
        <div class="sub"></div>
        <div class="img"></div>
        <div class="cta"></div>
      </div>
      <div class="stamp">$50</div>
    </div>

    <div class="cap">not online = <b>findable and sellable</b> · the lead and the product are one query</div>
  </div>
</div>
</body>
</html>
