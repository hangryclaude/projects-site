<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: one glyph "printed" out of living type — an A filled with flowing characters over a faint word-stream */
  svg.type { position: absolute; inset: 0; width: 100%; height: 100%; }
  .cap { position: absolute; right: 84px; bottom: 74px; text-align: right;
    font: 400 25px/1.5 "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.5); }
  .cap b { color: #b98cff; font-weight: 500; }
  .hint { position: absolute; left: 84px; top: 60px;
    font: 400 24px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.4); }
</style>
</head><body>
<div id="frame" data-label="flowtype-site">
  <div id="scene">
    <svg class="type" viewBox="0 0 1200 750">
      <defs>
        <clipPath id="glyph">
          <text x="600" y="570" text-anchor="middle" font-size="640"
            font-family="-apple-system, system-ui, sans-serif" font-weight="800">A</text>
        </clipPath>
        <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#7aa2ff"/>
          <stop offset="0.45" stop-color="#b98cff"/>
          <stop offset="0.75" stop-color="#ff8fd0"/>
          <stop offset="1" stop-color="#63e6d0"/>
        </linearGradient>
        <text id="row" x="80" font-size="30" letter-spacing="2"
          font-family="'SF Mono', Menlo, monospace">angusangusangusangusangusangusangusangusangusangusangusangusangusangus</text>
      </defs>
      <!-- faint background word-stream fills the negative space -->
      <g fill="#ebe8e2" opacity="0.045">
        <use href="#row" y="70"/><use href="#row" y="120"/><use href="#row" y="170"/>
        <use href="#row" y="220"/><use href="#row" y="270"/><use href="#row" y="320"/>
        <use href="#row" y="370"/><use href="#row" y="420"/><use href="#row" y="470"/>
        <use href="#row" y="520"/><use href="#row" y="570"/><use href="#row" y="620"/>
        <use href="#row" y="670"/>
      </g>
      <!-- the glyph, printed in living variable-weight type -->
      <g clip-path="url(#glyph)" fill="url(#iris)">
        <use href="#row" y="90"/><use href="#row" y="128"/><use href="#row" y="166"/>
        <use href="#row" y="204"/><use href="#row" y="242"/><use href="#row" y="280"/>
        <use href="#row" y="318"/><use href="#row" y="356"/><use href="#row" y="394"/>
        <use href="#row" y="432"/><use href="#row" y="470"/><use href="#row" y="508"/>
        <use href="#row" y="546"/><use href="#row" y="584"/><use href="#row" y="622"/>
      </g>
    </svg>
    <div class="hint">⤡ drag · scroll to zoom</div>
    <div class="cap"><b>one glyph</b>, baked to an SDF<br>printed in living type</div>
  </div>
</div>
</body></html>
