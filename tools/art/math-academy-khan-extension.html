<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a Math Academy lesson with the injected floating "Play Video" pill */
  #scene { display: flex; align-items: center; justify-content: center; }
  .lesson { position: relative; width: 780px; border: 1.5px solid rgba(235,232,226,0.25); border-radius: 18px;
            background: rgba(235,232,226,0.03); padding: 48px 54px; }
  .crumb { color: rgba(235,232,226,0.4); font: 400 24px "SF Mono", Menlo, monospace; letter-spacing: 0.04em; }
  .topic { color: #ebe8e2; font: 600 52px "SF Mono", Menlo, monospace; margin: 20px 0 34px; letter-spacing: -0.01em; }
  .eq { color: rgba(235,232,226,0.7); font: 400 38px "SF Mono", Menlo, monospace; }
  .bars { display: flex; flex-direction: column; gap: 16px; margin-top: 40px; }
  .bar { height: 16px; border-radius: 8px; background: rgba(235,232,226,0.12); }
  .bar.w1 { width: 88%; } .bar.w2 { width: 66%; }
  /* the injected pill */
  .pill { position: absolute; right: -46px; bottom: 54px; display: flex; align-items: center; gap: 18px;
          background: #7aa2ff; color: #0f0f11; padding: 20px 34px 20px 28px; border-radius: 999px;
          font: 700 32px "SF Mono", Menlo, monospace; box-shadow: 0 18px 50px rgba(122,162,255,0.35); }
  .ptri { width: 0; height: 0; border-left: 30px solid #0f0f11; border-top: 18px solid transparent; border-bottom: 18px solid transparent; }
  .inj { position: absolute; left: 54px; bottom: 74px; color: #7aa2ff; font: 400 25px "SF Mono", Menlo, monospace; }
</style>
</head>
<body>
<div id="frame" data-label="math-academy-khan-extension">
  <div id="scene">
    <div class="lesson">
      <div class="crumb">Math Academy › Calculus › lesson</div>
      <div class="topic">The Chain Rule</div>
      <div class="eq">d/dx&nbsp;[ f(g(x)) ] = f ′(g(x)) · g ′(x)</div>
      <div class="bars"><div class="bar w1"></div><div class="bar w2"></div></div>
      <div class="inj">↳ added by the extension</div>
      <div class="pill"><span class="ptri"></span>Play Video</div>
    </div>
  </div>
</div>
</body>
</html>
