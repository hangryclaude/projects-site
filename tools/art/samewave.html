<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: two people's music taste as sine waves, interfering constructively */
  #scene { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 40px; }
  .waves { display: block; }
  .readout { display: flex; align-items: baseline; gap: 28px; }
  .pct { font: 700 110px/1 "SF Mono", Menlo, monospace; color: #ebe8e2; letter-spacing: -0.03em; }
  .label { font: 400 40px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.55); }
  .sub { font: 400 26px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.4); }
  .sub .g { color: #1ed760; } .sub .m { color: #f453b6; }
</style>
</head>
<body>
<div id="frame" data-label="samewave">
  <div id="scene">
    <svg class="waves" width="1000" height="260" viewBox="0 0 1000 260">
      <!-- two sines, slightly out of phase, meeting -->
      <path d="M0 130 Q62 10 125 130 T250 130 T375 130 T500 130 T625 130 T750 130 T875 130 T1000 130"
            fill="none" stroke="#1ed760" stroke-width="7" stroke-linecap="round"
            opacity="0.95" style="filter: drop-shadow(0 0 16px rgba(30,215,96,0.5));"/>
      <path d="M-28 130 Q34 22 97 130 T222 130 T347 130 T472 130 T597 130 T722 130 T847 130 T972 130 T1097 130"
            fill="none" stroke="#f453b6" stroke-width="7" stroke-linecap="round"
            opacity="0.95" style="filter: drop-shadow(0 0 16px rgba(244,83,182,0.5));"/>
    </svg>
    <div class="readout"><span class="pct">87%</span><span class="label">same wave</span></div>
    <div class="sub"><span class="g">you</span> + <span class="m">them</span> · interfering constructively</div>
  </div>
</div>
</body>
</html>
