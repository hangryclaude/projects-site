<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: one handle checked across ten platforms — a clean free/taken checklist */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; padding: 0 120px; }
  .handle { font: 700 78px/1 "SF Mono", Menlo, monospace; color: #ebe8e2; letter-spacing: -0.02em; }
  .handle .at { color: #34d372; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; column-gap: 90px; row-gap: 22px; }
  .p { display: flex; align-items: center; gap: 18px; width: 380px; font: 500 32px "SF Mono", Menlo, monospace; }
  .p .plat { color: rgba(235,232,226,0.85); flex: 1; }
  .p .s { display: flex; align-items: center; gap: 12px; font-size: 27px; }
  .free { color: #34d372; }
  .taken { color: rgba(235,232,226,0.35); }
  .p.taken .plat { color: rgba(235,232,226,0.4); }
  .dot { width: 15px; height: 15px; border-radius: 50%; background: #34d372; }
  .x { color: #f4504a; font-weight: 700; }
</style>
</head><body>
<div id="frame" data-label="handlehunt">
  <div id="scene">
    <div class="handle"><span class="at">@</span>vertex</div>
    <div class="grid">
      <div class="p"><span class="plat">GitHub</span><span class="s free"><span class="dot"></span>free</span></div>
      <div class="p taken"><span class="plat">TikTok</span><span class="s taken"><span class="x">✕</span>taken</span></div>
      <div class="p"><span class="plat">Telegram</span><span class="s free"><span class="dot"></span>free</span></div>
      <div class="p taken"><span class="plat">Twitch</span><span class="s taken"><span class="x">✕</span>taken</span></div>
      <div class="p"><span class="plat">Cash App</span><span class="s free"><span class="dot"></span>free</span></div>
      <div class="p"><span class="plat">Gumroad</span><span class="s free"><span class="dot"></span>free</span></div>
      <div class="p taken"><span class="plat">Reddit</span><span class="s taken"><span class="x">✕</span>taken</span></div>
      <div class="p"><span class="plat">Linktree</span><span class="s free"><span class="dot"></span>free</span></div>
    </div>
  </div>
</div>
</body></html>
