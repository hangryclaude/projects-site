<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: the morning digest arriving as an iMessage bubble — machine status at a glance */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; }
  .bubble {
    position: relative; border-radius: 30px;
    background: #7aa2ff; color: #0f1220; padding: 34px 44px 38px;
    font-family: "SF Mono", Menlo, monospace;
  }
  .bubble::after {
    content: ""; position: absolute; left: -9px; bottom: 4px; width: 26px; height: 26px;
    background: #7aa2ff; clip-path: polygon(0 100%, 100% 100%, 100% 0);
  }
  .hd { font: 700 34px "SF Mono", Menlo, monospace; margin-bottom: 24px; letter-spacing: -0.01em; }
  .line { display: flex; align-items: center; gap: 16px; white-space: nowrap;
          font: 500 28px/1.85 "SF Mono", Menlo, monospace; }
  .line .k { width: 15px; height: 15px; border-radius: 50%; flex: none; }
  .ok { background: #1f7a44; }
  .warn { background: #b23c30; }
  .v { color: rgba(15,18,32,0.6); }
  .del { color: rgba(235,232,226,0.4); font: 400 24px "SF Mono", Menlo, monospace; align-self: flex-end; margin-right: 6px; }
</style>
</head>
<body>
<div id="frame" data-label="morning-brief">
  <div id="scene">
    <div class="bubble">
      <div class="hd">☀︎ Morning Brief · Fri</div>
      <div class="line"><span class="k ok"></span>spend <span class="v">$0.14 · $9 mo</span></div>
      <div class="line"><span class="k ok"></span>providers <span class="v">6 live · no lockdown</span></div>
      <div class="line"><span class="k ok"></span>daemons <span class="v">all 5 running</span></div>
      <div class="line"><span class="k warn"></span>3 repos <span class="v">uncommitted this week</span></div>
      <div class="line"><span class="k ok"></span>firewall on <span class="v">· 214 GB free</span></div>
    </div>
    <div class="del">delivered ✓</div>
  </div>
</div>
</body>
</html>
