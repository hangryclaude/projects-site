<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
  .panel {
    display: flex; align-items: center; gap: 30px;
    padding: 22px 34px; border: 1.5px solid rgba(235,232,226,0.16); border-radius: 20px;
    background: rgba(235,232,226,0.03);
  }
  .speed { font: 800 46px "SF Mono", Menlo, monospace; color: #ffb020; letter-spacing: -0.02em; }
  .speed span { font-size: 24px; color: rgba(235,232,226,0.5); font-weight: 400; }
  .track { position: relative; width: 300px; height: 8px; border-radius: 6px; background: rgba(235,232,226,0.14); }
  .track .fill { position: absolute; left: 0; top: 0; height: 8px; width: 26px; border-radius: 6px; background: #ff7a1f; }
  .track .knob { position: absolute; left: 14px; top: -9px; width: 26px; height: 26px; border-radius: 50%; background: #ffb020; box-shadow: 0 0 18px rgba(255,176,32,0.5); }
  .dial { font: 400 22px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.45); }
</style>
</head><body>
<div id="frame" data-label="nox-explode">
  <div id="scene">
    <svg width="480" height="400" viewBox="0 0 480 400">
      <defs>
        <g id="rl"><line x1="240" y1="200" x2="240" y2="52" stroke="#ff7a1f" stroke-width="7" stroke-linecap="round"/><circle cx="240" cy="46" r="10" fill="#ffb020"/></g>
        <g id="rm"><line x1="240" y1="200" x2="240" y2="92" stroke="#ff8c33" stroke-width="6" stroke-linecap="round"/><circle cx="240" cy="86" r="8" fill="#ffcf6a"/></g>
        <g id="rs"><line x1="240" y1="200" x2="240" y2="126" stroke="#ff7a1f" stroke-width="5" stroke-linecap="round"/><circle cx="240" cy="120" r="6" fill="#ffb020"/></g>
      </defs>
      <!-- shockwave rings -->
      <circle cx="240" cy="200" r="150" fill="none" stroke="rgba(255,122,31,0.18)" stroke-width="3"/>
      <circle cx="240" cy="200" r="120" fill="none" stroke="rgba(255,176,32,0.28)" stroke-width="2"/>
      <!-- rays -->
      <use href="#rl" transform="rotate(0 240 200)"/><use href="#rs" transform="rotate(15 240 200)"/><use href="#rm" transform="rotate(30 240 200)"/><use href="#rl" transform="rotate(45 240 200)"/><use href="#rs" transform="rotate(60 240 200)"/><use href="#rm" transform="rotate(75 240 200)"/><use href="#rl" transform="rotate(90 240 200)"/><use href="#rs" transform="rotate(105 240 200)"/><use href="#rm" transform="rotate(120 240 200)"/><use href="#rl" transform="rotate(135 240 200)"/><use href="#rs" transform="rotate(150 240 200)"/><use href="#rm" transform="rotate(165 240 200)"/><use href="#rl" transform="rotate(180 240 200)"/><use href="#rs" transform="rotate(195 240 200)"/><use href="#rm" transform="rotate(210 240 200)"/><use href="#rl" transform="rotate(225 240 200)"/><use href="#rs" transform="rotate(240 240 200)"/><use href="#rm" transform="rotate(255 240 200)"/><use href="#rl" transform="rotate(270 240 200)"/><use href="#rs" transform="rotate(285 240 200)"/><use href="#rm" transform="rotate(300 240 200)"/><use href="#rl" transform="rotate(315 240 200)"/><use href="#rs" transform="rotate(330 240 200)"/><use href="#rm" transform="rotate(345 240 200)"/>
      <!-- bright core -->
      <circle cx="240" cy="200" r="26" fill="#fff"/>
      <circle cx="240" cy="200" r="44" fill="none" stroke="#ffb020" stroke-width="4" opacity="0.6"/>
    </svg>
    <div class="panel">
      <div class="speed">0.03<span>×</span></div>
      <div class="track"><div class="fill"></div><div class="knob"></div></div>
      <div class="dial">slow-mo</div>
    </div>
  </div>
</div>
</body></html>
