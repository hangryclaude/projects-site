<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: log in → boot splash → six iTerm windows tiled 3x2, each already running claude */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
  .grid { display: grid; grid-template-columns: repeat(3, 300px); grid-template-rows: repeat(2, 176px); gap: 26px; }
  .win {
    border: 1.5px solid rgba(235,232,226,0.2); border-radius: 12px; overflow: hidden;
    background: #141417; display: flex; flex-direction: column;
  }
  .bar { display: flex; align-items: center; gap: 9px; padding: 12px 15px;
    background: rgba(235,232,226,0.05); border-bottom: 1px solid rgba(235,232,226,0.1); }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.r { background: #f4574d; } .dot.y { background: #e0c34a; } .dot.g { background: #4ade80; }
  .bar .dir { margin-left: 8px; color: rgba(235,232,226,0.5); font: 500 20px "SF Mono", Menlo, monospace; }
  .body { flex: 1; padding: 16px 17px; font: 400 21px/1.5 "SF Mono", Menlo, monospace; }
  .body .star { color: #7aa2ff; }
  .body .cl { color: #ebe8e2; }
  .body .rdy { color: rgba(235,232,226,0.4); font-size: 18px; }
  .caret { display: inline-block; width: 11px; height: 20px; background: #7aa2ff; vertical-align: -3px; }
  .cap { display: flex; align-items: center; gap: 18px; font: 400 27px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.5); }
  .cap b { color: #7aa2ff; font-weight: 600; }
</style></head><body>
<div id="frame" data-label="startup-claude">
  <div id="scene">
    <div class="grid">
      <div class="win"><div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="dir">inbox-engine</span></div><div class="body"><span class="star">✳</span> <span class="cl">claude</span><br><span class="rdy">ready<span class="caret"></span></span></div></div>
      <div class="win"><div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="dir">lead-agent</span></div><div class="body"><span class="star">✳</span> <span class="cl">claude</span><br><span class="rdy">ready<span class="caret"></span></span></div></div>
      <div class="win"><div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="dir">lib</span></div><div class="body"><span class="star">✳</span> <span class="cl">claude</span><br><span class="rdy">ready<span class="caret"></span></span></div></div>
      <div class="win"><div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="dir">glitchpilled</span></div><div class="body"><span class="star">✳</span> <span class="cl">claude</span><br><span class="rdy">ready<span class="caret"></span></span></div></div>
      <div class="win"><div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="dir">cheat-glasses</span></div><div class="body"><span class="star">✳</span> <span class="cl">claude</span><br><span class="rdy">ready<span class="caret"></span></span></div></div>
      <div class="win"><div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="dir">term-grid</span></div><div class="body"><span class="star">✳</span> <span class="cl">claude</span><br><span class="rdy">ready<span class="caret"></span></span></div></div>
    </div>
    <div class="cap"><b>login</b> → boot anim → <b>6× claude</b>, tiled 3×2</div>
  </div>
</div>
</body></html>
