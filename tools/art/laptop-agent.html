<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: claude driving the mac — a window mid-task, giant cursor doing the work */
  .win {
    position: absolute; left: 230px; top: 130px;
    width: 660px; height: 440px;
    border: 2px solid rgba(235,232,226,0.35); border-radius: 18px;
    background: rgba(235,232,226,0.02);
  }
  .titlebar {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 24px; border-bottom: 1px solid rgba(235,232,226,0.18);
  }
  .dot { width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid rgba(235,232,226,0.4); }
  .title { margin-left: 12px; color: rgba(235,232,226,0.4); font-size: 22px; }
  .tasks { padding: 36px 40px; display: flex; flex-direction: column; gap: 34px; }
  .task { font: 400 32px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.85); display: flex; gap: 22px; align-items: center; }
  .tick {
    width: 34px; height: 34px; border-radius: 9px; flex: none;
    border: 2px solid #a78bfa; color: #a78bfa;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600; background: rgba(167,139,250,0.1);
  }
  .task.pending { color: rgba(235,232,226,0.45); }
  .task.pending .tick { border-color: rgba(235,232,226,0.3); color: rgba(235,232,226,0.45); background: none; }
  .cursor { position: absolute; left: 790px; top: 390px; z-index: 10; }
  .cursor svg { filter: drop-shadow(0 0 28px rgba(167,139,250,0.9)) drop-shadow(0 0 70px rgba(167,139,250,0.45)); }
  .who {
    position: absolute; right: 88px; top: 84px;
    color: rgba(235,232,226,0.45); font-size: 26px;
  }
  .who b { color: #a78bfa; font-weight: 600; }
</style>
</head>
<body>
<div id="frame" data-label="laptop-agent">
  <div id="scene">
    <div class="who">you: afk · <b>claude: driving</b></div>
    <div class="win">
      <div class="titlebar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="title">this mac</span></div>
      <div class="tasks">
        <div class="task"><span class="tick">✓</span>open Studio</div>
        <div class="task"><span class="tick">✓</span>export final-final-v3</div>
        <div class="task pending"><span class="tick">…</span>draft the email</div>
      </div>
    </div>
    <div class="cursor">
      <svg width="190" height="210" viewBox="0 0 95 105">
        <path d="M12 4 L12 78 L30 62 L44 96 L58 90 L44 57 L68 56 Z"
              fill="#a78bfa" stroke="#0f0f11" stroke-width="3" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>
</div>
</body>
</html>
