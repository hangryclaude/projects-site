<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: boot ritual — six iTerm windows in a 3x2 grid, each already running claude */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
  .kicker { font: 500 24px "SF Mono", Menlo, monospace; letter-spacing: 0.18em; text-transform: uppercase; color: #46e0a0; display: flex; align-items: center; gap: 14px; }
  .kicker .arc { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #46e0a0; border-top-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 300px); grid-template-rows: repeat(2, 188px); gap: 22px; }
  .term { border: 1px solid rgba(70,224,160,0.3); border-radius: 11px; overflow: hidden; background: rgba(70,224,160,0.03); display: flex; flex-direction: column; }
  .tbar { display: flex; align-items: center; gap: 7px; padding: 12px 15px; border-bottom: 1px solid rgba(70,224,160,0.14); }
  .td { width: 11px; height: 11px; border-radius: 50%; }
  .r { background: #ff5f57; } .y { background: #febc2e; } .g { background: #28c840; }
  .tbar .ttl { margin-left: auto; font: 400 17px "SF Mono", Menlo, monospace; color: rgba(70,224,160,0.5); }
  .tbody { flex: 1; padding: 18px 20px; font: 400 22px/1.5 "SF Mono", Menlo, monospace; color: #46e0a0; }
  .tbody .u { color: rgba(235,232,226,0.5); }
  .cur { display: inline-block; width: 11px; height: 22px; background: #46e0a0; vertical-align: -3px; margin-left: 3px; }
  .run { display: block; margin-top: 12px; font-size: 18px; color: rgba(70,224,160,0.7); }
  .foot { font: 400 25px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.45); }
  .foot b { color: rgba(70,224,160,0.85); font-weight: 500; }
</style>
</head>
<body>
<div id="frame" data-label="night-shift">
  <div id="scene">
    <div class="kicker"><span class="arc"></span>boot sequence → six terminals</div>
    <div class="grid">
      <div class="term"><div class="tbar"><span class="td r"></span><span class="td y"></span><span class="td g"></span><span class="ttl">iterm · 1</span></div><div class="tbody"><span class="u">$</span> claude<span class="cur"></span><span class="run">● ready</span></div></div>
      <div class="term"><div class="tbar"><span class="td r"></span><span class="td y"></span><span class="td g"></span><span class="ttl">iterm · 2</span></div><div class="tbody"><span class="u">$</span> claude<span class="cur"></span><span class="run">● ready</span></div></div>
      <div class="term"><div class="tbar"><span class="td r"></span><span class="td y"></span><span class="td g"></span><span class="ttl">iterm · 3</span></div><div class="tbody"><span class="u">$</span> claude<span class="cur"></span><span class="run">● ready</span></div></div>
      <div class="term"><div class="tbar"><span class="td r"></span><span class="td y"></span><span class="td g"></span><span class="ttl">iterm · 4</span></div><div class="tbody"><span class="u">$</span> claude<span class="cur"></span><span class="run">● ready</span></div></div>
      <div class="term"><div class="tbar"><span class="td r"></span><span class="td y"></span><span class="td g"></span><span class="ttl">iterm · 5</span></div><div class="tbody"><span class="u">$</span> claude<span class="cur"></span><span class="run">● ready</span></div></div>
      <div class="term"><div class="tbar"><span class="td r"></span><span class="td y"></span><span class="td g"></span><span class="ttl">iterm · 6</span></div><div class="tbody"><span class="u">$</span> claude<span class="cur"></span><span class="run">● ready</span></div></div>
    </div>
    <div class="foot">a macOS Login Item · <b>wakes up ready to work</b></div>
  </div>
</div>
</body>
</html>
