  .card { height: 70px; border-radius: 9px; background: rgba(235,232,226,0.04); border: 1px solid rgba(235,232,226,0.12); padding: 9px 10px; }

  .card .bar i { width: 5px; height: 5px; border-radius: 50%; background: rgba(235,232,226,0.3); }
  .card .h { height: 8px; border-radius: 3px; margin-bottom: 7px; width: 78%; }
  .card .t { height: 4px; border-radius: 2px; background: rgba(235,232,226,0.16); width: 90%; }
  .v1 .h { background: #ff7a1f; } .v2 .h { background: #ffb020; } .v3 .h { background: #ff9a3f; width: 60%; } .v4 .h { background: #e08a2c; width: 68%; }
  .count { margin-top: 6px; font: 700 30px "SF Mono", Menlo, monospace; color: #ebe8e2; }
