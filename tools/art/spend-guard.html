<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: analog spend gauge sweeping toward a hard cap, kill-switch engaged */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; }
  svg { display: block; }
  .row { display: flex; align-items: center; gap: 24px; }
  .switch { position: relative; width: 96px; height: 52px; border-radius: 26px;
            border: 2.5px solid #3fdc82; background: rgba(63,220,130,0.16); }
  .switch .knob { position: absolute; top: 4px; right: 5px; width: 38px; height: 38px;
                  border-radius: 50%; background: #3fdc82; }
  .lab { color: #3fdc82; font: 700 32px "SF Mono", Menlo, monospace; letter-spacing: 0.06em; }
  .sub { color: rgba(235,232,226,0.45); font: 400 26px "SF Mono", Menlo, monospace; }
</style>
</head>
<body>
<div id="frame" data-label="spend-guard">
  <div id="scene">
    <svg width="1000" height="410" viewBox="0 0 1000 410" fill="none">
      <defs>
        <linearGradient id="g" x1="250" y1="330" x2="750" y2="330" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#3fdc82"/>
          <stop offset="0.55" stop-color="#e0c34a"/>
          <stop offset="1" stop-color="#ff4545"/>
        </linearGradient>
      </defs>
      <!-- arc -->
      <path d="M250 330 A250 250 0 0 1 750 330" stroke="url(#g)" stroke-width="22" stroke-linecap="round"/>
      <!-- minor ticks -->
      <g stroke="rgba(235,232,226,0.3)" stroke-width="2.5">
        <line x1="274" y1="330" x2="256" y2="330"/>
        <line x1="304.3" y1="217" x2="288.7" y2="208"/>
        <line x1="387" y1="134.3" x2="378" y2="118.7"/>
        <line x1="500" y1="104" x2="500" y2="86"/>
        <line x1="613" y1="134.3" x2="622" y2="118.7"/>
        <line x1="695.7" y1="217" x2="711.3" y2="208"/>
      </g>
      <!-- hard cap line -->
      <line x1="714.3" y1="252" x2="765" y2="233.6" stroke="#ff4545" stroke-width="7" stroke-linecap="round"/>
      <text x="778" y="212" fill="#ff4545" font-family="SF Mono, Menlo, monospace" font-size="27" font-weight="700">$25 CAP</text>
      <!-- needle, just shy of the cap -->
      <line x1="500" y1="330" x2="649.7" y2="213" stroke="#ebe8e2" stroke-width="7" stroke-linecap="round"/>
      <circle cx="500" cy="330" r="14" fill="#ebe8e2"/>
      <!-- labels -->
      <text x="250" y="388" fill="rgba(235,232,226,0.45)" font-family="SF Mono, Menlo, monospace" font-size="26" text-anchor="middle">$0</text>
      <text x="500" y="398" fill="#ebe8e2" font-family="SF Mono, Menlo, monospace" font-size="40" font-weight="600" text-anchor="middle">$23.71</text>
    </svg>
    <div class="row">
      <div class="switch"><div class="knob"></div></div>
      <span class="lab">FREE ONLY</span>
      <span class="sub">· paid API blocked</span>
    </div>
  </div>
</div>
</body>
</html>
