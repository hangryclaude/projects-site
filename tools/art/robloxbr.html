<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a battle-royale island under a shrinking storm — blocky players, next-zone ring */
  svg.map { position:absolute; inset:0; width:100%; height:100%; }
  .hud { position:absolute; top:70px; right:70px; display:flex; align-items:center; gap:16px;
    padding:14px 26px; border:1.5px solid rgba(235,232,226,0.3); border-radius:14px;
    background:rgba(235,232,226,0.04); color:#ebe8e2; font:600 27px "SF Mono",Menlo,monospace; }
  .hud .sk { width:14px; height:14px; border-radius:50%; background:#ff4d4d; box-shadow:0 0 16px #ff4d4d; }
  .hud b { color:#ffd43b; }
  .cap { position:absolute; bottom:104px; left:50%; transform:translateX(-50%);
    color:rgba(235,232,226,0.55); font:400 27px "SF Mono",Menlo,monospace; white-space:nowrap; }
  .cap b { color:#4fd48a; font-weight:600; }
</style>
</head><body>
<div id="frame" data-label="robloxbr"><div id="scene">
  <svg class="map" viewBox="0 0 1200 750">
    <!-- water -->
    <rect x="0" y="0" width="1200" height="750" fill="#0e2233"/>
    <g stroke="rgba(120,180,220,0.06)" stroke-width="1.5">
      <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="600" x2="1200" y2="600"/>
      <line x1="200" y1="0" x2="200" y2="750"/><line x1="400" y1="0" x2="400" y2="750"/>
      <line x1="600" y1="0" x2="600" y2="750"/><line x1="800" y1="0" x2="800" y2="750"/>
      <line x1="1000" y1="0" x2="1000" y2="750"/>
    </g>
    <!-- storm boundary (current safe circle) -->
    <circle cx="600" cy="375" r="300" fill="rgba(255,77,77,0.10)" stroke="#ff4d4d" stroke-width="4"/>
    <!-- safe interior punches the red back to water -->
    <circle cx="600" cy="375" r="296" fill="#0e2233"/>
    <!-- island -->
    <path d="M420 300 Q470 210 600 220 Q740 205 800 300 Q860 360 820 460 Q760 560 600 545 Q440 560 400 450 Q370 370 420 300 Z"
      fill="#2f7d4f" stroke="#5fbf7f" stroke-width="4"/>
    <path d="M420 300 Q470 210 600 220 Q740 205 800 300 Q860 360 820 460 Q760 560 600 545 Q440 560 400 450 Q370 370 420 300 Z"
      fill="none" stroke="rgba(230,215,150,0.45)" stroke-width="12" opacity="0.5"/>
    <!-- POIs -->
    <g fill="#e6d796"><rect x="516" y="316" width="18" height="18" rx="3"/><rect x="690" y="360" width="18" height="18" rx="3"/><rect x="580" y="470" width="18" height="18" rx="3"/></g>
    <!-- next-zone ring -->
    <circle cx="640" cy="400" r="120" fill="none" stroke="#4fd48a" stroke-width="3.5" stroke-dasharray="12 12"/>
    <!-- blocky players -->
    <g>
      <rect x="628" y="388" width="26" height="26" rx="4" fill="#ffd43b" transform="rotate(45 641 401)"/>
      <rect x="560" y="352" width="20" height="20" rx="3" fill="#ffffff" transform="rotate(45 570 362)"/>
      <rect x="712" y="430" width="20" height="20" rx="3" fill="#ffffff" transform="rotate(45 722 440)"/>
      <rect x="500" y="470" width="20" height="20" rx="3" fill="#ff8a5c" transform="rotate(45 510 480)"/>
      <rect x="890" y="250" width="20" height="20" rx="3" fill="#ff4d4d" transform="rotate(45 900 260)"/>
    </g>
  </svg>
  <div class="hud"><span class="sk"></span>SQUADS &middot; <b>12&nbsp;ALIVE</b></div>
  <div class="cap">solo &middot; duo &middot; squad &middot; <b>built from source</b>, not a place file</div>
</div></div>
</body></html>
