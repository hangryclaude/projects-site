<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: desktop chaos on the left, one amber arrow, everything filed on the right */
  #scene { font-family: "SF Mono", Menlo, monospace; }
  .chip {
    position: absolute; padding: 14px 24px; border-radius: 12px;
    border: 1.5px solid rgba(235, 232, 226, 0.3); color: rgba(235, 232, 226, 0.72);
    font: 400 26px "SF Mono", Menlo, monospace; background: rgba(235, 232, 226, 0.03);
    white-space: nowrap;
  }
  .arrow { position: absolute; left: 496px; top: 330px; color: #f5b04a; font: 400 96px "SF Mono", Menlo, monospace; }
  .panel {
    position: absolute; right: 84px; top: 178px; width: 420px;
    border: 1.5px solid rgba(235, 232, 226, 0.22); border-radius: 16px;
    background: rgba(235, 232, 226, 0.02); overflow: hidden;
  }
  .path {
    padding: 20px 28px; color: #f5b04a; font: 500 27px "SF Mono", Menlo, monospace;
    border-bottom: 1px solid rgba(235, 232, 226, 0.16); background: rgba(245, 176, 74, 0.07);
  }
  .row {
    padding: 19px 28px; color: rgba(235, 232, 226, 0.82); font: 400 27px "SF Mono", Menlo, monospace;
    border-bottom: 1px solid rgba(235, 232, 226, 0.09);
  }
  .row:last-child { border-bottom: none; }
  .hint { position: absolute; right: 84px; top: 550px; width: 420px; text-align: center;
    color: rgba(235, 232, 226, 0.42); font: 400 24px "SF Mono", Menlo, monospace; }
</style>
</head>
<body>
<div id="frame" data-label="file-warden">
  <div id="scene">
    <div class="chip" style="left:110px; top:168px; transform:rotate(-7deg)">report.pdf</div>
    <div class="chip" style="left:238px; top:296px; transform:rotate(5deg)">IMG_2041.png</div>
    <div class="chip" style="left:96px; top:412px; transform:rotate(3deg)">untitled(3).txt</div>
    <div class="chip" style="left:250px; top:520px; transform:rotate(-5deg)">asdf.mov</div>
    <div class="arrow">→</div>
    <div class="panel">
      <div class="path">~/Filed/&lt;type&gt;/2026-07</div>
      <div class="row">report.pdf</div>
      <div class="row">IMG_2041.png</div>
      <div class="row">untitled(3).txt</div>
      <div class="row">asdf.mov</div>
    </div>
    <div class="hint">swept after 24h idle</div>
  </div>
</div>
</body>
</html>
