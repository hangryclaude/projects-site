<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: the million-email plan that fact-checked itself down to 20-50k */
  #scene{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;}
  .lbl{font:400 27px "SF Mono",Menlo,monospace;color:rgba(235,232,226,0.42);letter-spacing:0.02em;}
  .big{position:relative;font:800 150px/1 "SF Mono",Menlo,monospace;color:rgba(235,232,226,0.34);letter-spacing:-0.03em;}
  .big .strike{position:absolute;left:-12px;right:-12px;top:52%;height:9px;background:#f4504a;border-radius:6px;transform:rotate(-4deg);}
  .arw{font:400 46px "SF Mono",Menlo,monospace;color:rgba(235,232,226,0.4);margin:-4px 0;}
  .now{display:flex;align-items:center;gap:26px;}
  .now .n{font:800 108px/1 "SF Mono",Menlo,monospace;color:#34d372;letter-spacing:-0.03em;}
  .now .u{font:400 34px/1.2 "SF Mono",Menlo,monospace;color:rgba(235,232,226,0.55);text-align:left;}
  .check{width:66px;height:66px;border-radius:50%;background:rgba(52,211,114,0.14);border:2.5px solid #34d372;display:flex;align-items:center;justify-content:center;font-size:38px;color:#34d372;}
  .cap{margin-top:16px;font:400 26px "SF Mono",Menlo,monospace;color:rgba(235,232,226,0.5);}
  .cap b{color:#f4504a;font-weight:700;}
</style></head><body>
<div id="frame" data-label="cold-1m-machine"><div id="scene">
  <div class="lbl">the plan said, in its own name</div>
  <div class="big">1,000,000<span class="strike"></span></div>
  <div class="arw">&darr;</div>
  <div class="now"><span class="n">20&ndash;50k</span><span class="u">/ month<br>signal-targeted</span><span class="check">&#10003;</span></div>
  <div class="cap">verification.html <b>talked it down</b> from a million</div>
</div></div></body></html>
