<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a hierarchical-mesh agent swarm — one coordinator spawning a role chain */
  #scene { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px; }
  svg { display: block; }
  .lab { font: 500 25px "SF Mono", Menlo, monospace; }
  .coord { font: 600 26px "SF Mono", Menlo, monospace; }
  .cap { font: 400 27px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.45); }
  .cap b { color: #3fdc82; font-weight: 500; }
</style>
</head>
<body>
<div id="frame" data-label="ruflo-test">
  <div id="scene">
    <svg width="1000" height="470" viewBox="0 0 1000 470">
      <!-- hierarchical edges: coordinator -> roles -->
      <g stroke="rgba(63,220,130,0.28)" stroke-width="2" fill="none">
        <line x1="500" y1="95" x2="120" y2="290"/>
        <line x1="500" y1="95" x2="310" y2="290"/>
        <line x1="500" y1="95" x2="500" y2="290"/>
        <line x1="500" y1="95" x2="690" y2="290"/>
        <line x1="500" y1="95" x2="880" y2="290"/>
      </g>
      <!-- mesh edges: the chain + cross links -->
      <g stroke="rgba(63,220,130,0.55)" stroke-width="2.5" fill="none">
        <line x1="120" y1="310" x2="310" y2="310"/>
        <line x1="310" y1="310" x2="500" y2="310"/>
        <line x1="500" y1="310" x2="690" y2="310"/>
        <line x1="690" y1="310" x2="880" y2="310"/>
        <path d="M120 330 Q310 400 500 330" stroke="rgba(63,220,130,0.3)"/>
        <path d="M500 330 Q690 400 880 330" stroke="rgba(63,220,130,0.3)"/>
      </g>
      <!-- coordinator -->
      <circle cx="500" cy="70" r="46" fill="rgba(63,220,130,0.16)" stroke="#3fdc82" stroke-width="2.5"/>
      <text class="coord" x="500" y="79" text-anchor="middle" fill="#ebe8e2">&#9670;</text>
      <text class="coord" x="500" y="79" text-anchor="middle" fill="#3fdc82" font-size="34" dy="-2">&#9670;</text>
      <text class="lab" x="500" y="152" text-anchor="middle" fill="rgba(235,232,226,0.7)">coordinator</text>
      <!-- role nodes -->
      <g>
        <circle cx="120" cy="310" r="30" fill="rgba(63,220,130,0.1)" stroke="#3fdc82" stroke-width="2.5"/>
        <circle cx="310" cy="310" r="30" fill="rgba(63,220,130,0.1)" stroke="#3fdc82" stroke-width="2.5"/>
        <circle cx="500" cy="310" r="30" fill="rgba(63,220,130,0.1)" stroke="#3fdc82" stroke-width="2.5"/>
        <circle cx="690" cy="310" r="30" fill="rgba(63,220,130,0.1)" stroke="#3fdc82" stroke-width="2.5"/>
        <circle cx="880" cy="310" r="30" fill="rgba(63,220,130,0.1)" stroke="#3fdc82" stroke-width="2.5"/>
      </g>
      <g fill="rgba(235,232,226,0.85)">
        <text class="lab" x="120" y="382" text-anchor="middle">researcher</text>
        <text class="lab" x="310" y="382" text-anchor="middle">architect</text>
        <text class="lab" x="500" y="382" text-anchor="middle">coder</text>
        <text class="lab" x="690" y="382" text-anchor="middle">tester</text>
        <text class="lab" x="880" y="382" text-anchor="middle">reviewer</text>
      </g>
    </svg>
    <div class="cap">hierarchical-mesh &middot; <b>&le;15 agents</b> &middot; spawn the chain in one message</div>
  </div>
</div>
</body>
</html>
