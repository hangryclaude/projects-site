<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: the popup Khan player window — 4 tabs, big play, 3-way topic resolve */
  #scene { display: flex; align-items: center; justify-content: center; }
  .win { width: 820px; border: 1.5px solid rgba(235,232,226,0.28); border-radius: 16px; overflow: hidden;
         background: rgba(235,232,226,0.03); }
  .bar { display: flex; align-items: center; gap: 12px; padding: 18px 24px; border-bottom: 1px solid rgba(235,232,226,0.14); }
  .dot { width: 15px; height: 15px; border-radius: 50%; }
  .r { background:#ff5f57 } .y { background:#febc2e } .g { background:#28c840 }
  .wt { margin-left: 14px; color: rgba(235,232,226,0.55); font: 400 24px "SF Mono", Menlo, monospace; }
  .tabs { display: flex; gap: 34px; padding: 20px 30px 0; font: 500 27px "SF Mono", Menlo, monospace; }
  .tab { color: rgba(235,232,226,0.45); padding-bottom: 14px; }
  .tab.on { color: #7aa2ff; border-bottom: 3px solid #7aa2ff; }
  .screen { margin: 26px 30px; height: 300px; border-radius: 12px; background: #000;
            display: flex; align-items: center; justify-content: center; position: relative;
            border: 1px solid rgba(235,232,226,0.12); }
  .play { width: 108px; height: 108px; border-radius: 50%; background: rgba(122,162,255,0.16);
          border: 3px solid #7aa2ff; display: flex; align-items: center; justify-content: center; }
  .tri { width: 0; height: 0; border-left: 42px solid #7aa2ff; border-top: 26px solid transparent; border-bottom: 26px solid transparent; margin-left: 12px; }
  .cap { position: absolute; left: 22px; bottom: 18px; color: rgba(235,232,226,0.65); font: 400 24px "SF Mono", Menlo, monospace; }
  .resolve { display: flex; gap: 14px; align-items: center; padding: 0 30px 30px; font: 400 24px "SF Mono", Menlo, monospace; color: rgba(235,232,226,0.5); flex-wrap: wrap; }
  .chip { color: #7aa2ff; border: 1.5px solid rgba(122,162,255,0.5); border-radius: 999px; padding: 8px 20px; }
  .arr { color: rgba(235,232,226,0.3); }
</style>
</head>
<body>
<div id="frame" data-label="math-academy-video">
  <div id="scene">
    <div class="win">
      <div class="bar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><span class="wt">Khan Booster — popup</span></div>
      <div class="tabs"><span class="tab on">Now</span><span class="tab">Saved</span><span class="tab">History</span><span class="tab">Settings</span></div>
      <div class="screen">
        <div class="play"><span class="tri"></span></div>
        <span class="cap">The Chain Rule — Khan Academy</span>
      </div>
      <div class="resolve">resolve:<span class="chip">topic map</span><span class="arr">›</span><span class="chip">API search</span><span class="arr">›</span><span class="chip">scrape · no key</span></div>
    </div>
  </div>
</div>
</body>
</html>
