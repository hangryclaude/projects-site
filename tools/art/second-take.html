<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="base.css">
<style>
  /* scene: a terminal — command fails, the remembered fix appears instantly */
  #scene { display: flex; align-items: center; justify-content: center; }
  .term {
    width: 940px; border: 1.5px solid rgba(235,232,226,0.25); border-radius: 14px;
    background: rgba(235,232,226,0.02); overflow: hidden;
  }
  .bar { display: flex; gap: 12px; padding: 20px 24px; border-bottom: 1px solid rgba(235,232,226,0.12); }
  .dot { width: 16px; height: 16px; border-radius: 50%; background: rgba(235,232,226,0.2); }
  .body { padding: 40px 48px 48px; display: flex; flex-direction: column; gap: 26px;
          font: 400 34px/1.3 "SF Mono", Menlo, monospace; }
  .cmd { color: #ebe8e2; }
  .cmd .ps { color: rgba(235,232,226,0.45); }
  .err { color: #ff5f56; }
  .fix {
    color: #3fdc82; background: rgba(63, 220, 130, 0.09);
    border-left: 5px solid #3fdc82;
    margin: 6px -48px -48px; padding: 26px 48px 30px;
    font-weight: 600; font-size: 30px; white-space: nowrap;
  }
  .fix .meta { color: rgba(63, 220, 130, 0.65); font-weight: 400; }
</style>
</head>
<body>
<div id="frame" data-label="second-take">
  <div id="scene">
    <div class="term">
      <div class="bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="body">
        <div class="cmd"><span class="ps">$</span> pnpm dev</div>
        <div class="err">zsh: command not found: pnpm</div>
        <div class="fix">→ corepack enable <span class="meta">· fix #47 · cached · $0</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
