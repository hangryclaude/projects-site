<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>html,body{margin:0;background:#222}canvas{display:block}</style>
</head>
<body>
<canvas id="c" width="1200" height="750"></canvas>
<script>
/* Seeded generative art tile. ?slug=x&cat=growth|agents|macos|web|markets */
const q = new URLSearchParams(location.search);
const slug = q.get('slug') || 'project';
const cat = q.get('cat') || 'agents';

function hash(s) { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
function mulberry32(a) { return function () { a |= 0; a = a + 0x6D2B79F5 | 0; let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t; return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }
const rnd = mulberry32(hash(slug));

const PALETTES = {
  growth:  { bg: '#131010', ink: ['#ff4d00', '#ff7a3c', '#ffb38a', '#f2ede6'], label: '#f2ede6' },
  agents:  { bg: '#0a0f0c', ink: ['#39ff88', '#1fcf6b', '#9dffc6', '#e8f5ec'], label: '#e8f5ec' },
  macos:   { bg: '#eef0f3', ink: ['#3b5bdb', '#7aa2ff', '#20304d', '#98a6bd'], label: '#20304d' },
  web:     { bg: '#101018', ink: ['#ff59c7', '#59d7ff', '#ffe459', '#b18cff'], label: '#f0eef6' },
  markets: { bg: '#14100a', ink: ['#ffb020', '#ff4d4d', '#ffd98a', '#f0e8da'], label: '#f0e8da' },
};
const P = PALETTES[cat] || PALETTES.agents;

const c = document.getElementById('c');
const x = c.getContext('2d');
const W = c.width, H = c.height;

x.fillStyle = P.bg;
x.fillRect(0, 0, W, H);

const variant = hash(slug) % 4;
const pick = arr => arr[Math.floor(rnd() * arr.length)];

if (variant === 0) {
  /* flow-field strands */
  const n = 90 + Math.floor(rnd() * 60);
  const f1 = 0.002 + rnd() * 0.004, f2 = 0.002 + rnd() * 0.004, ph = rnd() * 10;
  for (let i = 0; i < n; i++) {
    let px = rnd() * W, py = rnd() * H;
    x.strokeStyle = pick(P.ink); x.globalAlpha = 0.25 + rnd() * 0.5;
    x.lineWidth = 0.8 + rnd() * 2.2;
    x.beginPath(); x.moveTo(px, py);
    for (let s = 0; s < 130; s++) {
      const a = Math.sin(px * f1 + ph) * 2.2 + Math.cos(py * f2 - ph) * 2.2;
      px += Math.cos(a) * 5; py += Math.sin(a) * 5;
      x.lineTo(px, py);
    }
    x.stroke();
  }
} else if (variant === 1) {
  /* concentric offset arcs */
  const cx = W * (0.3 + rnd() * 0.4), cy = H * (0.3 + rnd() * 0.4);
  const rings = 26 + Math.floor(rnd() * 22);
  for (let i = 0; i < rings; i++) {
    const r = 18 + i * (10 + rnd() * 8);
    const a0 = rnd() * Math.PI * 2, sweep = 0.6 + rnd() * 5;
    x.strokeStyle = pick(P.ink); x.globalAlpha = 0.3 + rnd() * 0.55;
    x.lineWidth = 1 + rnd() * 6;
    x.beginPath(); x.arc(cx + (rnd() - 0.5) * 24, cy + (rnd() - 0.5) * 24, r, a0, a0 + sweep);
    x.stroke();
  }
} else if (variant === 2) {
  /* tick grid */
  const cols = 22 + Math.floor(rnd() * 14), rows = Math.floor(cols * H / W);
  const gw = W / cols, gh = H / rows;
  for (let i = 0; i < cols; i++) for (let j = 0; j < rows; j++) {
    if (rnd() < 0.22) continue;
    const px = i * gw + gw / 2, py = j * gh + gh / 2;
    const a = Math.sin(i * 0.6 + rnd()) + Math.cos(j * 0.5) + rnd() * 0.8;
    const len = gh * (0.25 + rnd() * 0.55);
    x.strokeStyle = pick(P.ink); x.globalAlpha = 0.35 + rnd() * 0.55;
    x.lineWidth = 1.2 + rnd() * 2.4;
    x.beginPath();
    x.moveTo(px - Math.cos(a) * len / 2, py - Math.sin(a) * len / 2);
    x.lineTo(px + Math.cos(a) * len / 2, py + Math.sin(a) * len / 2);
    x.stroke();
    if (rnd() < 0.06) { x.fillStyle = pick(P.ink); x.beginPath(); x.arc(px, py, 3 + rnd() * 5, 0, 7); x.fill(); }
  }
} else {
  /* displaced diagonal bands */
  const bands = 14 + Math.floor(rnd() * 12);
  const tilt = (rnd() - 0.5) * 0.9;
  for (let i = 0; i < bands; i++) {
    const y0 = (i / bands) * (H * 1.4) - H * 0.2;
    x.strokeStyle = pick(P.ink); x.globalAlpha = 0.3 + rnd() * 0.6;
    x.lineWidth = 3 + rnd() * 16;
    x.beginPath();
    for (let px = -20; px <= W + 20; px += 12) {
      const wob = Math.sin(px * (0.004 + rnd() * 0.002) + i) * (10 + rnd() * 40);
      const py = y0 + px * tilt + wob;
      px === -20 ? x.moveTo(px, py) : x.lineTo(px, py);
    }
    x.stroke();
  }
}

/* frame + label — shared system across all tiles */
x.globalAlpha = 1;
x.strokeStyle = P.label; x.globalAlpha = 0.35; x.lineWidth = 1;
x.strokeRect(28.5, 28.5, W - 57, H - 57);
x.globalAlpha = 1;
x.fillStyle = P.bg;
const label = slug;
x.font = '500 26px "Menlo", monospace';
const tw = x.measureText(label).width;
x.fillRect(46, H - 46 - 34, tw + 28, 44);
x.fillStyle = P.label;
x.fillText(label, 60, H - 48);

window.__done = true;
</script>
</body>
</html>
